services:
  mysql:
    image: mysql:8.0
    container_name: samurai_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword123}
      MYSQL_DATABASE: samurai_db
      MYSQL_USER: ${MYSQL_USER:-samurai_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-samurai_pass_2026}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword123}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - samurai_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: samurai_backend
    restart: unless-stopped
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: samurai_db
      MYSQL_USER: ${MYSQL_USER:-samurai_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-samurai_pass_2026}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-secret-in-production}
      FLASK_ENV: production
    ports:
      - "5001:5000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - samurai_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    container_name: samurai_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - samurai_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: samurai_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword123}
      PMA_PORT: 3306
    ports:
      - "8080:80"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - samurai_network

volumes:
  mysql_data:
    driver: local

networks:
  samurai_network:
    driver: bridge
