apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  labels:
    app: samurai-app
type: Opaque
data:
  # These are base64 encoded values
  # To encode your own: echo -n 'yourpassword' | base64
  #
  # Current values:
  #   MYSQL_ROOT_PASSWORD: samurai_root_pass
  #   MYSQL_PASSWORD:      samurai_pass
  #
  # Re-encode if you change passwords:
  #   echo -n 'samurai_root_pass' | base64  → c2FtdXJhaV9yb290X3Bhc3M=
  #   echo -n 'samurai_pass'      | base64  → c2FtdXJhaV9wYXNz

  MYSQL_ROOT_PASSWORD: cm9vdHBhc3N3b3JkMTIz
  MYSQL_PASSWORD: c2FtdXJhaV9wYXNzXzIwMjY=
