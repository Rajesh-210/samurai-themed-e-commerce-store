# ============================================================
# values.yaml — Samurai E-Commerce App
# CI pipeline updates backend.image.tag + frontend.image.tag
# ============================================================

# ─────────────────────────────────────────
# BACKEND (Flask + Gunicorn)
# ─────────────────────────────────────────
backend:
  image:
    repository: hamzamalik1/samurai-backend
    tag: sha-fe2b8a5
    pullPolicy: Always
  replicas: 1
  port: 5000
  service:
    type: ClusterIP
    port: 5000
  env:
    FLASK_ENV: production
    MYSQL_HOST: mysql-service
    MYSQL_PORT: "3306"
    MYSQL_DATABASE: samurai_db
    MYSQL_USER: samurai_user
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# ─────────────────────────────────────────
# FRONTEND (React + Vite + Nginx)
# ─────────────────────────────────────────
frontend:
  image:
    repository: hamzamalik1/samurai-frontend
    tag: sha-fe2b8a5
    pullPolicy: Always
  replicas: 1
  port: 80
  service:
    type: NodePort
    port: 80
    nodePort: 30080
  resources:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      cpu: 300m
      memory: 256Mi

# ─────────────────────────────────────────
# MYSQL
# ─────────────────────────────────────────
mysql:
  image:
    repository: mysql
    tag: "8.0"
    pullPolicy: IfNotPresent
  port: 3306
  service:
    type: ClusterIP
    port: 3306
  database: samurai_db
  user: samurai_user
  storage: 1Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# ─────────────────────────────────────────
# INGRESS (disabled for KinD — using NodePort)
# ─────────────────────────────────────────
ingress:
  enabled: false
