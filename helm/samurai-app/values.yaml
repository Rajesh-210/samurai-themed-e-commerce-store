# ============================================================
# values.yaml — Samurai E-Commerce App
# All environment-specific config lives here.
# CI pipeline updates backend.image.tag + frontend.image.tag
# via: helm upgrade --set backend.image.tag=sha-abc1234
# ============================================================

# ─────────────────────────────────────────
# BACKEND (Flask + Gunicorn)
# ─────────────────────────────────────────
backend:
  image:
    repository: hamzamalik1/samurai-backend
    tag: sha-243b8f6          # ← CI will override this with sha-<commit>
    pullPolicy: Always
  replicas: 1
  port: 5000
  service:
    type: ClusterIP
    port: 5000
  env:
    FLASK_ENV: production
    DB_HOST: mysql-service
    DB_PORT: "3306"
    DB_NAME: samurai_db
    DB_USER: samurai_user
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# ─────────────────────────────────────────
# FRONTEND (React + Vite + Nginx)
# ─────────────────────────────────────────
frontend:
  image:
    repository: hamzamalik1/samurai-frontend
    tag: sha-243b8f6          # ← CI will override this with sha-<commit>
    pullPolicy: Always
  replicas: 1
  port: 3000
  service:
    type: NodePort
    port: 3000
    nodePort: 30080      # Access app at http://<ec2-ip>:30080
  resources:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      cpu: 300m
      memory: 256Mi

# ─────────────────────────────────────────
# MYSQL
# ─────────────────────────────────────────
mysql:
  image:
    repository: mysql
    tag: "8.0"
    pullPolicy: IfNotPresent
  port: 3306
  service:
    type: ClusterIP
    port: 3306
  database: samurai_db
  user: samurai_user
  # Passwords are in mysql-secret.yaml (base64 encoded)
  # Do NOT put real passwords here
  storage: 1Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# ─────────────────────────────────────────
# INGRESS (disabled for KinD — using NodePort instead)
# ─────────────────────────────────────────
ingress:
  enabled: false
